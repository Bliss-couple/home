<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 부동산 통합 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 15px; background-color: #f8fafc; color: #1e293b; line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h2 { text-align: center; font-size: 1.25rem; margin-bottom: 20px; color: #0f172a; }
        .input-card { background: #f1f5f9; padding: 15px; border-radius: 16px; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .result-section { margin-top: 20px; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: #2563eb; margin-bottom: 10px; display: flex; align-items: center; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .val { font-weight: 700; color: #0f172a; }
        .highlight { color: #ef4444; font-size: 1.1rem; }
        .tax-detail { font-size: 0.75rem; color: #94a3b8; text-align: right; margin-top: 4px; }
        .split-item { font-size: 0.85rem; color: #64748b; padding-left: 10px; }
        #customContractInput { margin-top: 8px; display: none; background: #fff; border: 2px solid #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏡 주택 취득세 & 분양대금 계산기</h2>
    
    <div class="input-card">
        <div class="input-group">
            <label>총 분양가 (원)</label>
            <input type="number" id="totalPrice" placeholder="금액 입력" oninput="calculate()">
        </div>
        
        <div class="grid">
            <div class="input-group">
                <label>계약금 설정</label>
                <select id="contractType" onchange="toggleContractInput()">
                    <option value="0.1">분양가의 10%</option>
                    <option value="custom">직접 입력 (원)</option>
                </select>
                <input type="number" id="customContractInput" placeholder="계약금액 입력" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>전용 면적 (㎡)</label>
                <input type="number" id="area" placeholder="예: 84" value="84" oninput="calculate()">
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>취득 후 주택 수</label>
                <select id="houseCount" onchange="calculate()">
                    <option value="1">1주택</option>
                    <option value="2">2주택</option>
                    <option value="3">3주택</option>
                    <option value="4">4주택 이상</option>
                </select>
            </div>
            <div class="input-group">
                <label>지역 구분</label>
                <select id="isRegulated" onchange="calculate()">
                    <option value="false">비조정지역</option>
                    <option value="true">조정대상지역</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>중도금 조건 설정</label>
            <select id="splitCount" onchange="calculate()">
                <option value="0">중도금 없음 </option>
                <option value="1">중도금 1회 </option>
                <option value="2">중도금 2회 </option>
                <option value="3">중도금 3회 </option>
                <option value="4">중도금 4회 </option>
                <option value="5">중도금 5회 </option>
                <option value="6" selected>중도금 6회 </option>
            </select>
        </div>
    </div>

    <div class="result-section">
        <div class="section-title">💸 예상 취득세 분석 (2026.03)</div>
        <div class="row"><span>적용 총 세율</span><span class="val" id="totalRateDisp">0%</span></div>
        <div class="row"><span>총 세금액</span><span class="val highlight" id="taxAmount">0 원</span></div>
        <div class="tax-detail" id="taxDetailDisp">취득세 0% | 교육세 0% | 농특세 0%</div>
    </div>

    <div class="result-section">
        <div class="section-title">📅 대금 납부 일정</div>
        <div class="row"><span>계약금</span><span class="val" id="contractPriceDisp">0 원</span></div>
        <div id="midPaymentContainer">
            <div class="row" id="midTotalRow"><span>중도금 합계 (60%)</span><span class="val" id="midTotal">0 원</span></div>
        </div>
        <div class="row" style="margin-top:10px;">
            <span id="balanceLabel">잔금</span>
            <span class="val" id="balancePrice">0 원</span>
        </div>
    </div>
</div>

<script>
    function toggleContractInput() {
        const type = document.getElementById('contractType').value;
        const input = document.getElementById('customContractInput');
        input.style.display = (type === 'custom') ? 'block' : 'none';
        calculate();
    }

    function calculate() {
        const price = Number(document.getElementById('totalPrice').value);
        const area = Number(document.getElementById('area').value);
        const houseCount = Number(document.getElementById('houseCount').value);
        const isRegulated = document.getElementById('isRegulated').value === 'true';
        const split = Number(document.getElementById('splitCount').value);
        const contractType = document.getElementById('contractType').value;

        if (!price || price <= 0) return resetFields();

        // 1. 취득세 계산 (2026년 세법)
        let baseRate = 0;
        if (houseCount === 1) {
            if (price <= 600000000) baseRate = 1;
            else if (price <= 900000000) baseRate = (price * (2/300000000) - 3);
            else baseRate = 3;
        } else if (houseCount === 2) {
            baseRate = isRegulated ? 8 : (price <= 600000000 ? 1 : (price <= 900000000 ? (price * (2/300000000) - 3) : 3));
        } else if (houseCount === 3) {
            baseRate = isRegulated ? 12 : 8;
        } else {
            baseRate = 12;
        }
        let eduRate = baseRate * 0.1;
        let agriRate = (area > 85) ? (baseRate >= 8 ? 0.6 : 0.2) : 0;
        const totalRate = baseRate + eduRate + agriRate;
        const totalTax = price * (totalRate / 100);

        document.getElementById('totalRateDisp').innerText = totalRate.toFixed(2) + "%";
        document.getElementById('taxAmount').innerText = Math.floor(totalTax).toLocaleString() + " 원";
        document.getElementById('taxDetailDisp').innerText = `취득세 ${baseRate.toFixed(1)}% | 교육세 ${eduRate.toFixed(2)}% | 농특세 ${agriRate.toFixed(1)}%`;

        // 2. 납부 일정 계산
        let contract = (contractType === 'custom') ? Number(document.getElementById('customContractInput').value) : price * 0.1;
        let midTotal = (split === 0) ? 0 : price * 0.6;
        let balance = price - contract - midTotal;

        // UI 업데이트
        document.getElementById('contractPriceDisp').innerText = Math.floor(contract).toLocaleString() + " 원";
        document.getElementById('midTotal').innerText = Math.floor(midTotal).toLocaleString() + " 원";
        document.getElementById('balancePrice').innerText = Math.floor(balance).toLocaleString() + " 원";
        
        const midRow = document.getElementById('midTotalRow');
        midRow.style.display = (split === 0) ? 'none' : 'flex';
        
        const bLabel = document.getElementById('balanceLabel');
        const bPercent = ((balance / price) * 100).toFixed(0);
        bLabel.innerText = `잔금 (${bPercent}%)`;

        // 중도금 회차 상세
        const container = document.getElementById('midPaymentContainer');
        container.querySelectorAll('.split-item-row').forEach(el => el.remove());
        if (split > 0) {
            const perPayment = midTotal / split;
            for(let i=1; i<=split; i++) {
                const div = document.createElement('div');
                div.className = 'row split-item-row';
                div.innerHTML = `<span class="split-item">└ ${i}회차 중도금</span><span>${Math.floor(perPayment).toLocaleString()} 원</span>`;
                container.appendChild(div);
            }
        }
    }

    function resetFields() {
        ['totalRateDisp', 'taxAmount', 'contractPriceDisp', 'midTotal', 'balancePrice'].forEach(id => {
            document.getElementById(id).innerText = id === 'totalRateDisp' ? "0%" : "0 원";
        });
        document.querySelectorAll('.split-item-row').forEach(el => el.remove());
    }
</script>
</body>
</html>
